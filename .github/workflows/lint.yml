name: lint
permissions: {}

on:
  push:
    branches:
      - master
      - v2.*

  pull_request:
    branches:
      - master
      - v2.*

  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - run: |
          make devsetup
          make lint
